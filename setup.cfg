[flake8]
max-line-length = 88
extend-ignore = E203, W503
per-file-ignores =
    event_bus/*.py:F401,E501
    launch_pieuvre.py:E501,F541
    pieuvre/*.py:F401,E401,E501
    pieuvre/**/*.py:F401,E401,E501
    quant_hedge_ai/_legacy/*.py:F401,E402,E501,F541
    quant_hedge_ai/_legacy/**/*.py:F401,E402,E501,F541
    quant_hedge_ai/ai_evolution/evolution_engine.py:F401,E501
    tests/test_event_bus_integration.py:F401
    tests/test_ops_watchdog.py:F401
    tests/test_pieuvre.py:F401,E501

[isort]
profile = black
