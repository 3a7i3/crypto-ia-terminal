# ── Calcul des scores (référence pour l'implémentation future) ─────────────────
#
# stability_score = confirmed / (confirmed + rejected)
#   ex: 7 confirmed + 1 rejected → 7/8 = 0.875
#
# reproducibility_score = pairs_same_result / (total_pairs)
#   ex: 3 évaluations : C→C→R → 1 pair same / 2 pairs = 0.50
#
# scientific_confidence :
#   VeryHigh : stability >= 0.90 AND reproducibility >= 0.90 AND times_evaluated >= 3
#   High     : stability >= 0.75 AND reproducibility >= 0.75 AND times_evaluated >= 2
#   Medium   : stability >= 0.60 OR  reproducibility >= 0.60
#   Low      : sinon
#
# temporal_drift_detected = true si le résultat a changé entre deux campagnes successives
#   (indique une dépendance au régime de marché ou une instabilité structurelle)
