[pytest]
addopts = -v --tb=short --strict-markers
pythonpath = . core infra infra/monitoring
python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_*
log_cli = false
log_cli_level = INFO
asyncio_mode = auto
norecursedirs = _old _legacy archives _ARCHIVE_2026 .git .venv __pycache__ node_modules dist build
markers =
	asyncio: mark test as asynchronous
	integration: tests nécessitant un service local (API, orchestrateur, etc.)
	e2e: tests navigateur (Playwright, Selenium)
	slow: tests longue durée (100k+ cycles) — exécutés avec -m slow
