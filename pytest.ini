[pytest]
addopts = -v --tb=short --cov --cov-report=term-missing --cov-fail-under=75
pythonpath = .
python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_*
log_cli = true
log_cli_level = INFO
asyncio_mode = auto
norecursedirs = _old archives .git .venv __pycache__ node_modules dist build
markers =
	asyncio: mark test as asynchronous
	integration: tests nécessitant un service local (API, orchestrateur, etc.)
	e2e: tests navigateur (Playwright, Selenium)
