services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crypto_ai_postgres
    environment:
      POSTGRES_USER: crypto_ai
      POSTGRES_PASSWORD: crypto_secure_password_123
      POSTGRES_DB: crypto_ai_trading
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_ai"]
      timeout: 5s
      retries: 5
    networks:
      - crypto_ai_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: crypto_ai_redis
    command: redis-server --appendonly yes --requirepass redis_secure_password_123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_ai_network

  # Crypto AI Trading Bot (V7 Multi-Agent)
  trading_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto_ai_trading_bot
    environment:
      # Database
      DATABASE_URL: postgresql://crypto_ai:crypto_secure_password_123@postgres:5432/crypto_ai_trading
      REDIS_URL: redis://:redis_secure_password_123@redis:6379/0
      
      # Exchange API Keys (set these in .env)
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:-}
      KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
      KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
      COINBASE_API_KEY: ${COINBASE_API_KEY:-}
      COINBASE_API_SECRET: ${COINBASE_API_SECRET:-}
      
      # Trading Configuration
      PAPER_TRADING_MODE: "true"
      INITIAL_BALANCE: "100000"
      MAX_POSITIONS: "20"
      MAX_DAILY_LOSS_PCT: "0.05"
      MAX_TOTAL_LOSS_PCT: "0.2"
      MAX_POSITION_SIZE_PCT: "0.1"
      
      # Logging
      LOG_LEVEL: "INFO"
      
      # Monitoring
      ENABLE_MONITORING: "true"
      MONITORING_INTERVAL: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"  # API server
      - "8501:8501"  # Streamlit dashboard
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - crypto_ai_network
    restart: unless-stopped

  # Monitoring Dashboard (Streamlit)
  dashboard:
    image: python:3.11-slim
    container_name: crypto_ai_dashboard
    working_dir: /app
    command: >
      bash -c "pip install streamlit && 
               streamlit run dashboard/streamlit_dashboard.py"
    environment:
      DATABASE_URL: postgresql://crypto_ai:crypto_secure_password_123@postgres:5432/crypto_ai_trading
      REDIS_URL: redis://:redis_secure_password_123@redis:6379/0
    depends_on:
      - postgres
      - redis
    ports:
      - "8502:8501"
    volumes:
      - .:/app
    networks:
      - crypto_ai_network

  # Prometheus Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: crypto_ai_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - crypto_ai_network
    restart: unless-stopped

  # Grafana Visualization (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: crypto_ai_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - crypto_ai_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  crypto_ai_network:
    driver: bridge
