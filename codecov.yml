# Codecov configuration
codecov:
  require_ci_to_pass: yes
coverage:
  status:
    project:
      default:
        target: 80
        threshold: 2
        base: auto
    patch:
      default:
        target: 80
        threshold: 2
        base: auto
comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
