name: Phase C — Statistical Validation Gate

on:
  push:
    paths:
      - "src/analytics/**"
      - "src/domain/trade_event.py"
      - "tests/test_is_oos_splitter.py"
      - "tests/test_bootstrap_stability.py"
      - "tests/test_significance_gate.py"
      - "tests/test_alpha_pipeline.py"
      - "tests/test_replay_engine.py"
  pull_request:
    paths:
      - "src/analytics/**"
      - "src/domain/trade_event.py"
      - "tests/test_is_oos_splitter.py"
      - "tests/test_bootstrap_stability.py"
      - "tests/test_significance_gate.py"
      - "tests/test_alpha_pipeline.py"
      - "tests/test_replay_engine.py"
  workflow_dispatch:

concurrency:
  group: phase-c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase-c-gate:
    name: Phase C (294 tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          mkdir -p reports

      - name: C1 — IS/OOS Splitter (67 tests)
        run: |
          python -m pytest tests/test_is_oos_splitter.py \
            --tb=short -q --junit-xml=reports/c1.xml

      - name: C2 — Bootstrap Stability (48 tests)
        run: |
          python -m pytest tests/test_bootstrap_stability.py \
            --tb=short -q --junit-xml=reports/c2.xml

      - name: C5 — Significance Gate (68 tests)
        run: |
          python -m pytest tests/test_significance_gate.py \
            --tb=short -q --junit-xml=reports/c5.xml

      - name: Pipeline — Auditable (29 tests)
        run: |
          python -m pytest tests/test_alpha_pipeline.py \
            --tb=short -q --junit-xml=reports/pipeline.xml

      - name: Replay Engine — Vérificateur intégrité (31 tests)
        run: |
          python -m pytest tests/test_replay_engine.py \
            --tb=short -q --junit-xml=reports/replay.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-c-reports-${{ github.run_id }}
          path: reports/
