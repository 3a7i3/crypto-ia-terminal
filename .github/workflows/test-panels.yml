name: Test Dashboards and Panels

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit/functional tests
        run: pytest tests/
      - name: Run end-to-end panel tests
        run: python test_panels_with_report.py
      - name: Check coverage badges accessibility
        run: |
          pip install requests
          python scripts/check_badges.py
      - name: Upload panel test report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: panel-test-report
          path: panel_test_report.txt
