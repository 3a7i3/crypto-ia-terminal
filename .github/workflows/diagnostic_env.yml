name: Diagnostic Environnement Python

on:
  workflow_dispatch:
  push:
    paths:
      - 'diagnostic_env.py'
      - 'requirements.txt'
      - '.github/workflows/diagnostic_env.yml'

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
      - name: Diagnostic environnement
        run: |
          python diagnostic_env.py
