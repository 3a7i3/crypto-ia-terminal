name: Onboarding Dashboard CI

on:
  push:
    paths:
      - 'ONBOARDING_SCRIPT.py'
      - 'test_onboarding_script.py'
  pull_request:
    paths:
      - 'ONBOARDING_SCRIPT.py'
      - 'test_onboarding_script.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas pytest
      - name: Run unit tests
        run: pytest test_onboarding_script.py
