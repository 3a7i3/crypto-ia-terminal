name: BotDoctor CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pre-commit

      - name: Run all Python tests (unittest)
        run: |
          python -m unittest discover -s . -p 'test_*.py'

      - name: Run pytest with coverage (si présent)
        run: |
          pytest --cov=. --cov-report=html

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: run --all-files

      - name: Upload coverage report (htmlcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t botdoctor-supervision:latest .
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Docker image to DockerHub
        run: |
          docker tag botdoctor-supervision:latest ${{ secrets.DOCKERHUB_USERNAME }}/botdoctor-supervision:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/botdoctor-supervision:latest

  export-s3:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install boto3
        run: pip install boto3
      - name: Export reports to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: python supervision/export_reports_s3.py
