name: CI

on:
  push:
    branches: [ main, master, "chore/**", "feat/**", "fix/**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Annule les runs en cours si un nouveau push arrive sur la même branche
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. LINT — vérification du style et des imports
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les outils de lint
        run: pip install ruff

      - name: Ruff — vérification syntaxe et imports
        run: ruff check . --select=E,F,W --ignore=E501,E402 --exclude=__pycache__,.venv

  # ──────────────────────────────────────────────────────────────────────────
  # 2. TESTS — pytest + coverage
  # ──────────────────────────────────────────────────────────────────────────
  tests:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest
    needs: lint

    # Secrets optionnels — le bot tourne en mode paper si absents
    env:
      BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
      BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
      BINANCE_TESTNET:    "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      MARKET_SCANNER_SYNTHETIC: "true"   # pas de réseau pendant les tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Pytest + coverage
        run: |
          pytest \
            --cov=supervision \
            --cov=quant_hedge_ai/agents/market \
            --cov=quant_hedge_ai/agents/execution \
            --cov=quant_hedge_ai/agents/risk \
            --cov=quant_hedge_ai/agents/quant \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -x -q \
            supervision/test_supervision.py \
            quant_hedge_ai/strategy_lab/test_strategy_lab.py

      - name: Upload rapport de couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # 3. SMOKE TEST — vérifie que tous les modules s'importent et s'initialisent
  # ──────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: lint

    env:
      MARKET_SCANNER_SYNTHETIC: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances (core seulement)
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pytest pytest-cov

      - name: Smoke test
        run: python scripts/smoke_test_ci.py

  # ──────────────────────────────────────────────────────────────────────────
  # 4. VALIDATE HISTORICAL — walk-forward sur données synthétiques
  #    (données réelles uniquement si les clés Binance sont configurées)
  # ──────────────────────────────────────────────────────────────────────────
  validate-strategies:
    name: Walk-forward validation
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    env:
      BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
      BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install ccxt

      - name: Validation walk-forward (synthétique)
        run: |
          python scripts/validate_historical.py \
            --synthetic \
            --symbols BTC/USDT ETH/USDT \
            --years 1 \
            --output databases/walk_forward_results_ci.json

      - name: Upload résultats walk-forward
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walk-forward-results
          path: databases/walk_forward_results_ci.json
